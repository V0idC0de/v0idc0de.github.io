# Site settings
title: TBD Journal # site title
description: >- # site description
  Writing on computer technology and related topics, either because I find them interesting,
  insightful for others, or my brain just doesn't stop giving me random thoughts about them.
lang: en-US # default lang
timezone: Europe/Berlin # set your timezone
image: assets/img/ogp.png # This image used for Open Graph more info https://ogp.me/
# repo: https://github.com/piharpi/jekyll-klise # site repo [optional]
mode: dark # default theme "dark" | "light"

# Profile settings
author:
  name: Simon Kohl # author name
  bio: >- # tell to the world
    Developer and Cloud Engineer with special focus on automation, infrastructure-as-code, and Google Cloud Platform.
    Enjoying new technologies and innovative ways to do things. Always at the verge of learning something new!
  username: V0idC0de # general username
  github: V0idC0de # github username
  # twitter: twitter_username # twitter username
  # facebook: facebook_username # facebook username
  email: sknx@proton.me # email adress
  avatar: /assets/img/avatar.jpg # change with your own avatar

# URL settings
url: "https://v0idc0de.github.io" #
# baseurl: v0idc0de.github.io
permalink: /:title/
google_analytics: # leave it blank if not wish
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Homepage limit posts
number_of_posts: 5

# Build settings
# theme: klise
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - lighthouse.png
  - klise-*.gem
  - klise.gemspec

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles
